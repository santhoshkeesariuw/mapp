<style>

/* ── Tab bar ── */
.bn-tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--line); margin-bottom: 24px; }
.bn-tab {
  display: flex; align-items: center; gap: 7px;
  padding: 10px 20px; border: none; background: none;
  color: var(--text-3); font-size: 13px; font-weight: 500;
  font-family: inherit; cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color 0.15s; white-space: nowrap;
}
.bn-tab:hover { color: var(--text-2); }
.bn-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.bn-tab i { font-size: 15px; }
.bn-panel { display: none; }
.bn-panel.active { display: block; }

/* ── Site filter chips ── */
.site-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.site-chip {
  padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--line-2); background: transparent; color: var(--text-3);
  cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.site-chip:hover { border-color: var(--accent); color: var(--text); }
.site-chip.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

/* ── Banner preview ── */
.banner-preview {
  background: #141929; border-radius: 6px; border: 1px solid var(--line-2);
  overflow: hidden; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; position: relative;
}
.bp-inner {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; padding: 6px; width: 100%; height: 100%;
}
.bp-logo { height: 6px; border-radius: 2px; background: rgba(212,165,116,0.5); }
.bp-line { height: 4px; border-radius: 1px; background: rgba(255,255,255,0.1); }
.bp-cta { height: 12px; border-radius: 3px; background: rgba(212,165,116,0.35); }
.bp-label {
  position: absolute; bottom: 3px; right: 4px;
  font-size: 8px; color: rgba(255,255,255,0.2);
  font-family: 'JetBrains Mono', monospace;
}
/* Leaderboard 728×90 → shown 180×22 */
.bp-leaderboard { width: 180px; height: 22px; }
.bp-leaderboard .bp-inner { flex-direction: row; padding: 3px 6px; gap: 6px; }
.bp-leaderboard .bp-logo { width: 24px; height: 8px; }
.bp-leaderboard .bp-line { flex: 1; }
.bp-leaderboard .bp-cta { width: 32px; height: 14px; flex-shrink: 0; }
/* Medium Rectangle 300×250 → shown 90×75 */
.bp-rect { width: 90px; height: 75px; }
.bp-rect .bp-logo { width: 40px; }
.bp-rect .bp-line { width: 70%; }
.bp-rect .bp-cta { width: 52px; margin-top: 4px; height: 14px; }
/* Half Page 300×600 → shown 60×120 */
.bp-halfpage { width: 60px; height: 120px; }
.bp-halfpage .bp-logo { width: 36px; }
.bp-halfpage .bp-line { width: 80%; }
.bp-halfpage .bp-cta { width: 44px; margin-top: 6px; height: 14px; }
/* Mobile 320×50 → shown 160×25 */
.bp-mobile { width: 160px; height: 25px; }
.bp-mobile .bp-inner { flex-direction: row; padding: 3px 6px; gap: 5px; }
.bp-mobile .bp-logo { width: 20px; height: 7px; }
.bp-mobile .bp-line { flex: 1; }
.bp-mobile .bp-cta { width: 28px; height: 12px; flex-shrink: 0; }
/* Sidebar 160×600 → shown 40×100 */
.bp-skyscraper { width: 40px; height: 100px; }
.bp-skyscraper .bp-logo { width: 28px; }
.bp-skyscraper .bp-line { width: 85%; }
.bp-skyscraper .bp-cta { width: 30px; margin-top: 4px; height: 12px; }

/* ── Banner row ── */
.banner-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 0;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
  transition: background 0.12s;
  cursor: pointer;
}
.banner-row:last-child { border-bottom: none; }
.banner-row:hover { background: var(--ink-3); }
.banner-meta { padding: 0 16px; min-width: 0; }
.banner-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.banner-placement { font-size: 11px; color: var(--text-3); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.banner-placement span { display: flex; align-items: center; gap: 4px; }
.banner-stats { display: flex; gap: 24px; align-items: center; flex-shrink: 0; }
.bstat { text-align: right; }
.bstat-val { font-size: 14px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.bstat-lbl { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; margin-top: 1px; }

/* ── Site group ── */
.site-group { margin-bottom: 16px; }
.site-group-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; background: var(--ink-3); border-radius: 8px 8px 0 0;
  border: 1px solid var(--line); border-bottom: none;
}
.site-group-body { border: 1px solid var(--line); border-radius: 0 0 8px 8px; overflow: hidden; }
.site-group-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.site-group-stats { display: flex; gap: 20px; font-size: 12px; color: var(--text-3); }

/* ── AI Suggestion cards ── */
.sugg-banner-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
.sugg-banner-card {
  background: var(--ink-2); border: 1px solid var(--line);
  border-radius: 10px; overflow: hidden;
  transition: border-color 0.15s;
  cursor: pointer;
}
.sugg-banner-card:hover { border-color: var(--accent); }
.sbc-preview {
  background: #0e1220; padding: 20px;
  display: flex; align-items: center; justify-content: center;
  border-bottom: 1px solid var(--line); min-height: 100px;
}
.sbc-body { padding: 14px 16px; }
.sbc-site { font-size: 10px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 5px; }
.sbc-title { font-size: 13px; font-weight: 600; margin-bottom: 5px; }
.sbc-reason { font-size: 11px; color: var(--text-3); line-height: 1.55; margin-bottom: 12px; }
.sbc-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.sbc-lift { font-size: 13px; font-weight: 700; color: var(--good); }

/* ── Mini chart inside banner card ── */
.mini-perf-chart { height: 40px; width: 100%; }

@media (max-width: 768px) {
  .banner-stats { gap: 12px; }
  .bstat { display: none; }
  .bstat:first-child, .bstat:nth-child(2) { display: block; }
  .sugg-banner-grid { grid-template-columns: 1fr; }
  .banner-row { grid-template-columns: auto 1fr; }
  .banner-stats { display: none; }
}
</style>

    </div>
  </main>
</div>

// HELPERS
// ────────────────────────────────────────────────
function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000)    return (n/1000).toFixed(0) + 'K';
  return n;
}
function fmtCurrency(n) {
  return '$' + n.toLocaleString();
}
function trendIcon(t) {
  if (t === 'up')   return `<i class="ti ti-trending-up"   style="color:var(--good);font-size:13px;"></i>`;
  if (t === 'down') return `<i class="ti ti-trending-down" style="color:var(--bad);font-size:13px;"></i>`;
  return `<i class="ti ti-minus" style="color:var(--text-3);font-size:13px;"></i>`;
}

function bannerPreviewHTML(format) {
  const cls = {
    'Leaderboard':      'bp-leaderboard',
    'Medium Rectangle': 'bp-rect',
    'Half Page':        'bp-halfpage',
    'Mobile Banner':    'bp-mobile',
    'Wide Skyscraper':  'bp-skyscraper',
  }[format] || 'bp-rect';
  const dimLabel = { 'Leaderboard':'728×90','Medium Rectangle':'300×250','Half Page':'300×600','Mobile Banner':'320×50','Wide Skyscraper':'160×600' }[format] || '';
  return `<div class="banner-preview ${cls}"><div class="bp-inner"><div class="bp-logo"></div><div class="bp-line"></div><div class="bp-cta"></div></div><span class="bp-label">${dimLabel}</span></div>`;
}

// ────────────────────────────────────────────────

function renderTopMetrics() {
  const total        = CURRENT_ADS.length;
  const active       = CURRENT_ADS.filter(a => a.status === 'active').length;
  const totalImpr    = CURRENT_ADS.reduce((s,a) => s+a.impressions, 0);
  const totalRev     = CURRENT_ADS.reduce((s,a) => s+a.revenue, 0);
  const avgCTR       = (CURRENT_ADS.reduce((s,a) => s+a.ctr, 0) / CURRENT_ADS.length).toFixed(2);

  document.getElementById('topMetrics').innerHTML = `
    <div class="metric-card">
      <div class="metric-label">Total banners</div>
      <div class="metric-val">${total}</div>
      <div class="metric-delta up"><i class="ti ti-ad-2"></i>${active} active</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Impressions · 30d</div>
      <div class="metric-val">${fmt(totalImpr)}</div>
      <div class="metric-delta up"><i class="ti ti-trending-up"></i>+14%</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Avg CTR</div>
      <div class="metric-val">${avgCTR}<span class="unit">%</span></div>
      <div class="metric-delta up"><i class="ti ti-trending-up"></i>+0.4pp</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Revenue · 30d</div>
      <div class="metric-val">${fmtCurrency(totalRev)}</div>
      <div class="metric-delta up"><i class="ti ti-trending-up"></i>+22%</div>
    </div>
  `;
}

function renderSiteFilters(activeSite) {
  const all = ['All sites', ...SITES];
  document.getElementById('siteFilters').innerHTML = all.map(s => `
    <button class="site-chip ${activeSite === s ? 'active' : ''}" data-site="${s}">${s}</button>
  `).join('');
  document.querySelectorAll('.site-chip').forEach(btn => {
    btn.addEventListener('click', () => renderBannerGroups(btn.dataset.site));
  });
}

function renderBannerGroups(filterSite = 'All sites') {
  // Update chip active state
  document.querySelectorAll('.site-chip').forEach(c =>
    c.classList.toggle('active', c.dataset.site === filterSite)
  );
  const sites = filterSite === 'All sites' ? SITES : [filterSite];
  const container = document.getElementById('bannerGroups');
  container.innerHTML = '';

  sites.forEach(site => {
    const ads = CURRENT_ADS.filter(a => a.site === site);
    if (!ads.length) return;

    const totalImpr = ads.reduce((s,a) => s+a.impressions, 0);
    const totalRev  = ads.reduce((s,a) => s+a.revenue, 0);
    const active    = ads.filter(a => a.status === 'active').length;
    const dot       = ['medical.uworld','nursing.uworld','pa.uworld','accounting.uworld'].includes(site) ? 'var(--good)' : 'var(--warn)';

    const rows = ads.map(ad => `
      <div class="banner-row" data-id="${ad.id}">
        ${bannerPreviewHTML(ad.format)}
        <div class="banner-meta">
          <div class="banner-name">${ad.name}</div>
          <div class="banner-placement">
            <span><i class="ti ti-layout" style="font-size:11px;"></i>${ad.format} · ${ad.dims}</span>
            <span><i class="ti ti-map-pin" style="font-size:11px;"></i>${ad.placement}</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);">${ad.page}</span>
            <span class="pill" style="background:${ad.statusColor}22;color:${ad.statusColor};font-size:10px;padding:1px 7px;">${ad.status}</span>
          </div>
        </div>
        <div class="banner-stats">
          <div class="bstat">
            <div class="bstat-val">${fmt(ad.impressions)}</div>
            <div class="bstat-lbl">Impr.</div>
          </div>
          <div class="bstat">
            <div class="bstat-val" style="color:var(--accent);">${ad.ctr}%</div>
            <div class="bstat-lbl">CTR</div>
          </div>
          <div class="bstat">
            <div class="bstat-val">${fmt(ad.clicks)}</div>
            <div class="bstat-lbl">Clicks</div>
          </div>
          <div class="bstat">
            <div class="bstat-val" style="color:var(--good);">${fmtCurrency(ad.revenue)}</div>
            <div class="bstat-lbl">Revenue</div>
          </div>
          <div class="bstat" style="padding-left:8px;">
            ${trendIcon(ad.trend)}
          </div>
          <div class="bstat">
            <button class="btn btn-sm" style="font-size:11px;padding:4px 10px;">Edit</button>
          </div>
        </div>
      </div>
    `).join('');

    container.insertAdjacentHTML('beforeend', `
      <div class="site-group">
        <div class="site-group-head">
          <div class="site-group-name">
            <i class="ti ti-circle-filled" style="color:${dot};font-size:8px;"></i>
            ${site}
            <span style="font-size:11px;color:var(--text-3);font-weight:400;">${ads.length} banner${ads.length>1?'s':''} · ${active} active</span>
          </div>
          <div class="site-group-stats">
            <span>${fmt(totalImpr)} impr</span>
            <span style="color:var(--good);">${fmtCurrency(totalRev)} revenue</span>
            <button class="btn btn-sm" style="font-size:11px;"><i class="ti ti-plus" style="font-size:11px;"></i>Add</button>
          </div>
        </div>
        <div class="site-group-body">${rows}</div>
      </div>
    `);
  });
}

function renderAiMetrics() {
  const potentialRev = AI_SUGGESTIONS.reduce((s,a) => {
    const n = parseInt(a.estRevenue.replace(/[^0-9]/g,''));
    return s + n;
  }, 0);
  document.getElementById('aiMetrics').innerHTML = `
    <div class="metric-card">
      <div class="metric-label">Suggestions</div>
      <div class="metric-val">${AI_SUGGESTIONS.length}</div>
      <div class="metric-delta up"><i class="ti ti-sparkles"></i>AI-generated</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Est. new revenue/mo</div>
      <div class="metric-val" style="color:var(--good);">+${fmtCurrency(potentialRev)}</div>
      <div class="metric-delta up"><i class="ti ti-trending-up"></i>if all deployed</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Critical priority</div>
      <div class="metric-val">${AI_SUGGESTIONS.filter(a=>a.priority==='Critical').length}</div>
      <div class="metric-delta down"><i class="ti ti-alert-circle"></i>act now</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Sites covered</div>
      <div class="metric-val">${[...new Set(AI_SUGGESTIONS.map(a=>a.site))].length}</div>
      <div class="metric-delta up"><i class="ti ti-world"></i>of ${SITES.length} sites</div>
    </div>
  `;
}

function renderSuggestedBanners() {
  document.getElementById('suggestedBanners').innerHTML = AI_SUGGESTIONS.map(s => `
    <div class="sugg-banner-card" data-id="${s.id}">
      <div class="sbc-preview">
        <div class="banner-preview ${s.format_class}" style="transform:scale(1.15);">
          <div class="bp-inner" style="--accent-preview:${s.accentColor};">
            <div class="bp-logo" style="background:${s.accentColor};"></div>
            <div class="bp-line"></div>
            <div class="bp-cta" style="background:${s.accentColor};"></div>
          </div>
          <span class="bp-label">${s.dims}</span>
        </div>
      </div>
      <div class="sbc-body">
        <div class="sbc-site">${s.site}</div>
        <div class="sbc-title">${s.name}</div>
        <div style="font-size:11px;color:var(--text-3);margin-bottom:6px;display:flex;align-items:center;gap:6px;">
          <i class="ti ti-map-pin" style="font-size:11px;"></i>${s.placement}
        </div>
        <div class="sbc-reason">${s.reason}</div>
        <div style="background:var(--ink-3);border-radius:6px;padding:8px 10px;margin-bottom:12px;font-size:11px;color:var(--text-3);line-height:1.55;">
          <span style="color:var(--text-2);font-weight:600;">Creative direction: </span>${s.creative}
        </div>
        <div class="sbc-footer">
          <div style="display:flex;gap:14px;">
            <div>
              <div class="sbc-lift">${s.lift}</div>
              <div style="font-size:10px;color:var(--text-3);">Est. CTR lift</div>
            </div>
            <div>
              <div style="font-size:13px;font-weight:700;color:var(--good);">${s.estRevenue}</div>
              <div style="font-size:10px;color:var(--text-3);">Est. revenue</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="pill" style="background:${s.priorityColor}22;color:${s.priorityColor};font-size:10px;padding:2px 8px;">${s.priority}</span>
            <button class="btn btn-sm btn-primary" style="font-size:11px;padding:4px 10px;"><i class="ti ti-plus" style="font-size:11px;"></i>Deploy</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

// ────────────────────────────────────────────────
// TABS + INIT
// ────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Tab switching
  document.querySelectorAll('.bn-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.bn-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.bn-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // Render everything
  renderTopMetrics();
  renderSiteFilters('All sites');
  renderBannerGroups('All sites');
  renderAiMetrics();
  renderSuggestedBanners();
});
</script>

</body>
</html>
